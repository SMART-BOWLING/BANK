<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>КІДЛАНДІЯ БАНК</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root {
    --dark: #1f2937;
    --accent: #0079fd;
    --light: #f3f4f6;
    --white: #ffffff;
    --border: #e5e7eb;
    --success: #10b981;
    --warning: #f59e0b;
    --primary: #3b82f6;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    background: var(--light);
    padding: 0;
    margin: 0;
}

.wrapper {
    max-width: 100%;
    margin: 0;
    padding: 0;
}

.header {
    background: var(--white);
    border-radius: 0;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
}

.header-row {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    flex-wrap: wrap;
    gap: 0;
    background: var(--white);
    border-bottom: 1px solid var(--border);
}

.banner-area {
    flex: 1;
    min-width: 200px;
    height: auto;
    min-height: 80px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    margin: 0;
    padding: 0;
    border-radius: 0;
}

.banner-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.header-buttons {
    display: flex;
    gap: 0;
    align-items: stretch;
    padding: 0;
    background: var(--white);
}

.search-btn, .clear-btn, .refresh-btn, .add-btn {
    width: 80px;
    height: 100%;
    min-width: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border-radius: 0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: #0174fd;
    color: white;
    border: none;
    border-left: 1px solid rgba(255,255,255,0.2);
}

.search-btn {
    border-left: none;
}

.search-btn i, .clear-btn i, .refresh-btn i, .add-btn i {
    font-size: 22px;
    margin-bottom: 2px;
}

.search-btn:hover, .clear-btn:hover, .refresh-btn:hover, .add-btn:hover {
    opacity: 0.85;
    background: #0165cc;
}

.add-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.controls {
    background: var(--white);
    border-radius: 0;
    padding: 24px 20px;
    margin: 0 0 8px 0;
    border: 1px solid var(--border);
}

.controls-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: flex-start;
}

.search-section {
    flex: 2;
    min-width: 260px;
}

.search-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 0;
}

.search-field {
    display: flex;
    flex-direction: column;
}

.search-field label {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 6px;
}

.search-field label i {
    margin-right: 5px;
    font-size: 13px;
}

.search-field input,
.search-field select {
    width: 100%;
    padding: 9px 10px;
    border-radius: 0;
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    background: #f9fafb;
    transition: all 0.2s;
}

.search-field input:focus,
.search-field select:focus {
    outline: none;
    border-color: #0174fd;
    background: var(--white);
    box-shadow: 0 0 0 2px rgba(1,116,253,0.1);
}

.table-container {
    background: var(--white);
    border-radius: 0;
    border: 1px solid var(--border);
    overflow-x: auto;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    padding: 0;
    margin: 0 0 8px 0;
}

.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
    font-weight: 500;
    table-layout: auto;
}

.data-table th {
    background: #f8fafc;
    padding: 12px 10px;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
    color: var(--dark);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    white-space: nowrap;
}

.data-table td {
    padding: 10px 10px;
    border-bottom: 1px solid #f0f2f5;
    color: #374151;
    text-align: center;
    font-weight: 500;
    font-size: 15px;
    vertical-align: middle;
}

.data-table tr:hover {
    background: #f0f7ff;
}

.data-table tr:last-child td {
    border-bottom: none;
}

.balance-positive {
    color: var(--success);
    font-weight: 700;
}

.balance-negative {
    color: #0174fd;
    font-weight: 700;
}

.balance-zero {
    color: var(--dark);
    font-weight: 700;
}

.visits-badge {
    display: inline-block;
    color: #374151;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    min-width: 40px;
    background: transparent;
    padding: 0;
    border-radius: 0;
}

.action-buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
}

.btn-operation {
    padding: 5px 12px;
    border: none;
    border-radius: 0;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

.btn-operation:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.btn-deposit {
    background: #017afe;
    color: white;
}

.btn-deposit:hover:not(:disabled) {
    background: #0165cc;
}

.btn-withdraw {
    background: #e41598;
    color: white;
}

.btn-withdraw:hover:not(:disabled) {
    background: #c01080;
}

.btn-spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-spinner {
    display: inline-block;
    width: 30px;
    height: 30px;
    border: 3px solid #e2e8f0;
    border-radius: 50%;
    border-top-color: var(--dark);
    animation: spin 0.7s linear infinite;
}

.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #6b7280;
    font-weight: 500;
    font-size: 15px;
}

.empty-state i {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
}

.empty-state p {
    font-weight: 500;
    font-size: 15px;
}

.empty-state button {
    font-weight: 600;
    font-size: 13px;
    border-radius: 0;
    padding: 6px 16px;
    background: #0174fd;
    border: none;
    color: white;
    cursor: pointer;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: white;
    padding: 10px 20px;
    border-radius: 0;
    font-size: 13px;
    font-weight: 600;
    z-index: 1000;
    animation: fadeUp 0.25s ease;
}

.toast.error {
    background: #0174fd;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.date-cell {
    white-space: nowrap;
    font-size: 14px;
    font-weight: 500;
    color: #6b7280;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 2000;
    align-items: center;
    justify-content: center;
}

.modal.active {
    display: flex;
}

.modal-content {
    background: var(--white);
    border-radius: 0;
    width: 90%;
    max-width: 450px;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalSlide 0.2s ease;
}

@keyframes modalSlide {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

.modal-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.modal-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--dark);
}

.modal-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #9ca3af;
}

.modal-close:hover {
    color: var(--dark);
}

.modal-body {
    padding: 16px 20px;
}

.form-group {
    margin-bottom: 12px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 4px;
}

.form-group label i {
    width: 18px;
    font-size: 12px;
    color: #0174fd;
}

.form-group input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 0;
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
}

.form-group input:focus {
    outline: none;
    border-color: #0174fd;
    box-shadow: 0 0 0 2px rgba(1,116,253,0.1);
}

.form-group input:disabled {
    font-weight: 500;
    background: #f3f4f6;
    color: #4b5563;
}

.modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
}

.modal-footer button {
    padding: 8px 16px;
    border-radius: 0;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
}

.modal-footer button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.btn-cancel {
    background: #e5e7eb;
    color: var(--dark);
}

.btn-cancel:hover {
    background: #d1d5db;
}

.btn-submit {
    background: #0174fd;
    color: white;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.btn-submit:hover:not(:disabled) {
    background: #0160d4;
}

/* Стили для редактируемых ячеек */
.editable-cell {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    justify-content: center;
}

.cell-value {
    word-break: break-word;
    max-width: 150px;
}

.btn-edit-cell {
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
    transition: all 0.2s;
    opacity: 0;
    flex-shrink: 0;
}

tr:hover .btn-edit-cell {
    opacity: 1;
}

.btn-edit-cell:hover {
    color: #0174fd;
    transform: scale(1.1);
}

/* Стиль для колонки последнего визита */
.last-visit-col {
    font-weight: 600;
    color: #374151;
}

.last-visit-col .last-visit-empty {
    color: #9ca3af;
    font-weight: 400;
}

@media (max-width: 768px) {
    .header-row {
        flex-direction: column;
        align-items: stretch;
    }
    
    .banner-area {
        min-height: 60px;
    }
    
    .search-btn, .clear-btn, .refresh-btn, .add-btn {
        width: 65px;
        min-width: 65px;
        font-size: 10px;
    }
    
    .search-btn i, .clear-btn i, .refresh-btn i, .add-btn i {
        font-size: 18px;
    }
    
    .controls {
        padding: 18px 14px;
    }
    
    .search-field label {
        font-size: 13px;
    }
    
    .search-grid {
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
    }
    
    .search-field input,
    .search-field select {
        padding: 8px 8px;
        font-size: 13px;
    }
    
    .controls { margin-bottom: 6px; }
    .table-container { margin: 0 0 6px 0; }
    .data-table th, .data-table td { padding: 8px 6px; font-size: 13px; }
    .data-table th { font-size: 13px; }
    .btn-operation { font-size: 10px; padding: 4px 8px; }
    .visits-badge { font-size: 13px; }
    .date-cell { font-size: 12px; }
    .balance-positive, .balance-negative, .balance-zero { font-size: 13px; }
    .modal-content { border-radius: 0; }
    .btn-edit-cell { opacity: 0.7; font-size: 11px; }
}

@media (max-width: 480px) {
    .search-btn, .clear-btn, .refresh-btn, .add-btn {
        width: 55px;
        min-width: 55px;
        font-size: 9px;
    }
    
    .search-btn i, .clear-btn i, .refresh-btn i, .add-btn i {
        font-size: 16px;
    }
    
    .controls {
        padding: 16px 12px;
    }
    
    .search-field label {
        font-size: 12px;
    }
    
    .search-grid {
        grid-template-columns: 1fr;
        gap: 10px;
    }
    
    .btn-edit-cell { opacity: 0.7; }
}
</style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <div class="header-row">
            <div class="banner-area" id="bannerContainer">
                <img src="https://res.cloudinary.com/dplmdnxvk/image/upload/v1780930566/jnbjh9xkfz1ulwqhzwzv.png" alt="Банер">
            </div>
            
            <div class="header-buttons">
                <button id="searchBtnHeader" class="search-btn">
                    <i class="fas fa-search"></i> <span>Знайти</span>
                </button>
                <button id="clearSearchBtnHeader" class="clear-btn">
                    <i class="fas fa-eraser"></i> <span>Очистити</span>
                </button>
                <button class="refresh-btn" onclick="loadData(true)">
                    <i class="fas fa-sync-alt"></i> <span>Оновити</span>
                </button>
                <button class="add-btn" onclick="openAddModal()">
                    <i class="fas fa-plus-circle"></i> <span>Додати</span>
                </button>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="controls-row">
            <div class="search-section">
                <div class="search-grid">
                    <div class="search-field">
                        <label><i class="fas fa-user"></i> ПІБ дорослого</label>
                        <input type="text" id="parentSearch" placeholder="Пошук...">
                    </div>
                    <div class="search-field">
                        <label><i class="fas fa-phone-alt"></i> Телефон</label>
                        <input type="text" id="phoneSearch" placeholder="Пошук...">
                    </div>
                    <div class="search-field">
                        <label><i class="fas fa-user"></i> Прізвище дитини</label>
                        <input type="text" id="childSurnameSearch" placeholder="Пошук...">
                    </div>
                    <div class="search-field">
                        <label><i class="fas fa-user"></i> Ім'я дитини</label>
                        <input type="text" id="childNameSearch" placeholder="Пошук...">
                    </div>
                    <div class="search-field">
                        <label><i class="fas fa-credit-card"></i> Номер картки</label>
                        <input type="text" id="cardSearch" placeholder="Пошук...">
                    </div>
                    <div class="search-field">
                        <label><i class="fas fa-calendar-alt"></i> Вік дитини</label>
                        <input type="number" id="ageSearch" placeholder="Вік (років)" min="0" max="18">
                    </div>
                    <div class="search-field">
                        <label><i class="fas fa-clock"></i> Останній візит</label>
                        <input type="date" id="lastVisitSearch">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <div id="tableContent">
            <div class="empty-state">
                <div class="loading-spinner"></div>
                <p>Завантаження даних...</p>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для редактирования -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-edit"></i> <span id="editModalTitle">Редагувати</span></h2>
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label><i class="fas fa-pen"></i> <span id="editFieldLabel">Нове значення</span></label>
                <input type="text" id="editFieldValue" placeholder="Введіть нове значення">
            </div>
            <input type="hidden" id="editRow">
            <input type="hidden" id="editField">
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeEditModal()">Скасувати</button>
            <button class="btn-submit" id="submitEditBtn" onclick="saveEdit()"><i class="fas fa-save"></i> Зберегти</button>
        </div>
    </div>
</div>

<!-- Модальное окно для добавления -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-user-plus"></i> Додати клієнта</h2>
            <button class="modal-close" onclick="closeAddModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> ПІБ дорослого</label>
                <input type="text" id="addParent" placeholder="ПІБ мами/тата">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone-alt"></i> Мобільний телефон</label>
                <input type="text" id="addPhone" placeholder="+38 XXX XXX XX XX">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Прізвище дитини</label>
                <input type="text" id="addChildSurname" placeholder="Прізвище дитини">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Ім'я дитини</label>
                <input type="text" id="addChildName" placeholder="Ім'я дитини">
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Вік дитини (років)</label>
                <input type="number" id="addChildAge" placeholder="Вік дитини" min="0" max="18">
            </div>
            <div class="form-group">
                <label><i class="fas fa-credit-card"></i> Номер картки</label>
                <input type="text" id="addCardNumber" placeholder="Номер картки">
            </div>
            <div class="form-group">
                <label><i class="fas fa-money-bill-wave"></i> Початковий баланс</label>
                <input type="number" id="addBalance" placeholder="0" step="0.01" value="0">
            </div>
            <div class="form-group">
                <label><i class="fas fa-chart-line"></i> Відвідування</label>
                <input type="text" value="1 (авто)" disabled style="background:#f3f4f6;">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeAddModal()">Скасувати</button>
            <button class="btn-submit" id="submitAddBtn" onclick="addNewUser()"><i class="fas fa-save"></i> Додати</button>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKXyHErXZOgYv8Wq3IUZRWCH6KOMOLN5gaNa4bF7-EO-gTeD0fetkIIdVQnYy9Gt-y5w/exec';

let allData = [];
let isLoading = false;
let currentFilteredData = [];
let tableBodyRef = null;

const FIELD_MAP = {
    'parent': { label: 'ПІБ дорослого', column: 1 },
    'phone': { label: 'Телефон', column: 2 },
    'childSurname': { label: 'Прізвище дитини', column: 3 },
    'childName': { label: "Ім'я дитини", column: 4 },
    'age': { label: 'Вік дитини', column: 5 },
    'cardNumber': { label: 'Номер картки', column: 6 }
};

function formatDate(dateValue) {
    if (!dateValue) return '—';
    let date;
    if (dateValue instanceof Date) {
        date = dateValue;
    } else if (typeof dateValue === 'string') {
        date = new Date(dateValue);
        if (isNaN(date.getTime())) return dateValue;
    } else if (typeof dateValue === 'number') {
        date = new Date(dateValue);
    } else {
        return '—';
    }
    if (isNaN(date.getTime())) return '—';
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = date.getFullYear();
    return `${d}.${m}.${y}`;
}

function formatDateTime(dateValue) {
    if (!dateValue) return '—';
    let date;
    if (dateValue instanceof Date) {
        date = dateValue;
    } else if (typeof dateValue === 'string') {
        date = new Date(dateValue);
        if (isNaN(date.getTime())) return dateValue;
    } else if (typeof dateValue === 'number') {
        date = new Date(dateValue);
    } else {
        return '—';
    }
    if (isNaN(date.getTime())) return '—';
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = date.getFullYear();
    const h = String(date.getHours()).padStart(2, '0');
    const min = String(date.getMinutes()).padStart(2, '0');
    return `${d}.${m}.${y} ${h}:${min}`;
}

function formatDateForCompare(dateValue) {
    if (!dateValue) return null;
    let date;
    if (dateValue instanceof Date) {
        date = dateValue;
    } else if (typeof dateValue === 'string') {
        date = new Date(dateValue);
        if (isNaN(date.getTime())) return null;
    } else if (typeof dateValue === 'number') {
        date = new Date(dateValue);
    } else {
        return null;
    }
    if (isNaN(date.getTime())) return null;
    return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function calculateAge(birthdayValue) {
    if (!birthdayValue) return null;
    let birthDate;
    if (birthdayValue instanceof Date) {
        birthDate = birthdayValue;
    } else if (typeof birthdayValue === 'string') {
        birthDate = new Date(birthdayValue);
        if (isNaN(birthDate.getTime())) return null;
    } else if (typeof birthdayValue === 'number') {
        birthDate = new Date(birthdayValue);
    } else {
        return null;
    }
    if (isNaN(birthDate.getTime())) return null;
    
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const monthDiff = today.getMonth() - birthDate.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }
    return age;
}

function formatNumber(value) {
    if (value === null || value === undefined || value === '') return '0';
    const num = typeof value === 'number' ? value : parseFloat(value);
    if (isNaN(num)) return '0';
    return num.toLocaleString('uk-UA');
}

function getBalanceClass(value) {
    const num = typeof value === 'number' ? value : parseFloat(value);
    if (isNaN(num)) return '';
    if (num > 0) return 'balance-positive';
    if (num < 0) return 'balance-negative';
    return 'balance-zero';
}

function callScript(fn, data = null) {
    return new Promise((resolve, reject) => {
        const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        
        window[callbackName] = function(response) {
            delete window[callbackName];
            if (response && response.error) {
                reject(new Error(response.error));
            } else if (response && response.result) {
                if (response.result.error) {
                    reject(new Error(response.result.error));
                } else {
                    resolve(response.result);
                }
            } else {
                resolve(response);
            }
        };
        
        let url = `${SCRIPT_URL}?fn=${fn}&callback=${callbackName}`;
        if (data) {
            url += `&data=${encodeURIComponent(JSON.stringify(data))}`;
        }
        
        const script = document.createElement('script');
        script.src = url;
        script.onerror = () => {
            delete window[callbackName];
            reject(new Error('Помилка з\'єднання з сервером'));
        };
        
        document.body.appendChild(script);
        setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                reject(new Error('Таймаут запиту'));
            }
        }, 30000);
    });
}

async function loadData(showLoading = true) {
    if (isLoading) return;
    isLoading = true;
    
    const container = document.getElementById('tableContent');
    if (showLoading && container) {
        container.innerHTML = '<div class="empty-state"><div class="loading-spinner"></div><p>Завантаження даних...</p></div>';
    }
    
    try {
        const data = await callScript('getData');
        if (data && data.error) throw new Error(data.error);
        allData = Array.isArray(data) ? data : [];
        applyFilters();
    } catch (err) {
        console.error(err);
        if (container) {
            container.innerHTML = `<div class="empty-state">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Помилка: ${err.message}</p>
                <button onclick="loadData(true)">Повторити</button>
            </div>`;
        }
        showToast(`Помилка: ${err.message}`, true);
    } finally {
        isLoading = false;
    }
}

function applyFilters() {
    const parentFilter = document.getElementById('parentSearch').value.toLowerCase().trim();
    const phoneFilter = document.getElementById('phoneSearch').value.toLowerCase().trim();
    const childSurnameFilter = document.getElementById('childSurnameSearch').value.toLowerCase().trim();
    const childNameFilter = document.getElementById('childNameSearch').value.toLowerCase().trim();
    const cardFilter = document.getElementById('cardSearch').value.toLowerCase().trim();
    const ageSearch = document.getElementById('ageSearch').value;
    const lastVisitSearch = document.getElementById('lastVisitSearch').value;
    
    let filtered = [...allData];
    
    if (parentFilter) {
        filtered = filtered.filter(item => item.parent && item.parent.toLowerCase().includes(parentFilter));
    }
    if (phoneFilter) {
        filtered = filtered.filter(item => item.phone && item.phone.toLowerCase().includes(phoneFilter));
    }
    if (childSurnameFilter) {
        filtered = filtered.filter(item => item.childSurname && item.childSurname.toLowerCase().includes(childSurnameFilter));
    }
    if (childNameFilter) {
        filtered = filtered.filter(item => item.childName && item.childName.toLowerCase().includes(childNameFilter));
    }
    if (cardFilter) {
        filtered = filtered.filter(item => item.cardNumber && item.cardNumber.toLowerCase().includes(cardFilter));
    }
    if (ageSearch !== '') {
        const ageNum = parseInt(ageSearch);
        if (!isNaN(ageNum) && ageNum >= 0) {
            filtered = filtered.filter(item => {
                const age = calculateAge(item.age);
                return age !== null && age === ageNum;
            });
        }
    }
    if (lastVisitSearch) {
        const searchDate = new Date(lastVisitSearch);
        searchDate.setHours(0, 0, 0, 0);
        filtered = filtered.filter(item => {
            if (!item.lastVisit) return false;
            const itemDate = formatDateForCompare(item.lastVisit);
            return itemDate && itemDate.getTime() === searchDate.getTime();
        });
    }
    
    currentFilteredData = filtered;
    renderTableFast(filtered);
}

function createEditableCell(value, row, field, isDate = false) {
    const container = document.createElement('div');
    container.className = 'editable-cell';
    
    const span = document.createElement('span');
    span.className = 'cell-value';
    if (field === 'age') {
        const age = calculateAge(value);
        span.textContent = age !== null ? `${age} років` : '—';
    } else {
        span.textContent = isDate ? formatDate(value) : (value || '—');
    }
    
    const editBtn = document.createElement('button');
    editBtn.className = 'btn-edit-cell';
    editBtn.innerHTML = '<i class="fas fa-pen"></i>';
    editBtn.title = 'Редагувати';
    editBtn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        openEditModal(row, field, value);
    };
    
    container.appendChild(span);
    container.appendChild(editBtn);
    
    return container;
}

function renderTableFast(data) {

        const dateA = a.registrationDate ? new Date(a.registrationDate) : new Date(0);
        const dateB = b.registrationDate ? new Date(b.registrationDate) : new Date(0);
        return dateB - dateA;
    });
    
    if (!tableBodyRef || !document.querySelector('.data-table')) {
        createFullTable(sortedData);
        return;
    }
    
    const tbody = document.createElement('tbody');
    
    sortedData.forEach(item => {
        const tr = document.createElement('tr');
        
        const parentCell = document.createElement('td');
        parentCell.appendChild(createEditableCell(item.parent, item.row, 'parent'));
        tr.appendChild(parentCell);
        
        const phoneCell = document.createElement('td');
        phoneCell.appendChild(createEditableCell(item.phone, item.row, 'phone'));
        tr.appendChild(phoneCell);
        
        const surnameCell = document.createElement('td');
        surnameCell.appendChild(createEditableCell(item.childSurname, item.row, 'childSurname'));
        tr.appendChild(surnameCell);
        
        const nameCell = document.createElement('td');
        nameCell.appendChild(createEditableCell(item.childName, item.row, 'childName'));
        tr.appendChild(nameCell);
        
        const ageCell = document.createElement('td');
        ageCell.appendChild(createEditableCell(item.age, item.row, 'age'));
        tr.appendChild(ageCell);
        
        const cardCell = document.createElement('td');
        cardCell.appendChild(createEditableCell(item.cardNumber, item.row, 'cardNumber'));
        tr.appendChild(cardCell);
        
        const visitsCell = document.createElement('td');
        const visitsSpan = document.createElement('span');
        visitsSpan.className = 'visits-badge';
        visitsSpan.textContent = item.visits || 0;
        visitsCell.appendChild(visitsSpan);
        tr.appendChild(visitsCell);
        
        const balanceCell = document.createElement('td');
        balanceCell.textContent = formatNumber(item.balance);
        balanceCell.className = getBalanceClass(item.balance);
        tr.appendChild(balanceCell);
        
        const lastVisitCell = document.createElement('td');
        lastVisitCell.className = 'last-visit-col';
        if (item.lastVisit) {
            lastVisitCell.textContent = formatDateTime(item.lastVisit);
            lastVisitCell.style.color = '#374151';
        } else {
            lastVisitCell.textContent = '—';
            lastVisitCell.className = 'last-visit-col last-visit-empty';
        }
        tr.appendChild(lastVisitCell);
        
        const actionCell = document.createElement('td');
        actionCell.className = 'action-buttons';
        
        const childFullName = `${item.childSurname || ''} ${item.childName || ''}`.trim();
        
        const depositBtn = document.createElement('button');
        depositBtn.className = 'btn-operation btn-deposit';
        depositBtn.innerHTML = '<i class="fas fa-plus-circle"></i> Поповнення';
        depositBtn.onclick = (e) => {
            e.preventDefault();
            handleDeposit(item.row, item.parent, childFullName, depositBtn);
        };
        
        const withdrawBtn = document.createElement('button');
        withdrawBtn.className = 'btn-operation btn-withdraw';
        withdrawBtn.innerHTML = '<i class="fas fa-minus-circle"></i> Зняти';
        withdrawBtn.onclick = (e) => {
            e.preventDefault();
            handleWithdraw(item.row, item.parent, childFullName, withdrawBtn);
        };
        
        actionCell.appendChild(depositBtn);
        actionCell.appendChild(withdrawBtn);
        tr.appendChild(actionCell);
        
        tbody.appendChild(tr);
    });
    
    const oldTbody = document.querySelector('.data-table tbody');
    if (oldTbody) {
        oldTbody.replaceWith(tbody);
    }
    tableBodyRef = tbody;
}

function openEditModal(row, field, currentValue) {
    const modal = document.getElementById('editModal');
    document.getElementById('editRow').value = row;
    document.getElementById('editField').value = field;
    
    const fieldInfo = FIELD_MAP[field];
    if (fieldInfo) {
        document.getElementById('editModalTitle').textContent = `Редагувати: ${fieldInfo.label}`;
        document.getElementById('editFieldLabel').textContent = fieldInfo.label;
    }
    
    const input = document.getElementById('editFieldValue');
    if (field === 'age') {
        const age = calculateAge(currentValue);
        input.type = 'number';
        input.value = age !== null ? age : '';
        input.placeholder = 'Введіть вік (років)';
        input.min = 0;
        input.max = 18;
    } else {
        input.type = 'text';
        input.value = currentValue || '';
    }
    
    modal.classList.add('active');
    input.focus();
    input.select();
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
}

async function saveEdit() {
    const row = parseInt(document.getElementById('editRow').value);
    const field = document.getElementById('editField').value;
    let value = document.getElementById('editFieldValue').value.trim();
    
    if (field === 'age') {
        const ageNum = parseInt(value);
        if (isNaN(ageNum) || ageNum < 0 || ageNum > 18) {
            showToast('Введіть коректний вік (0-18 років)', true);
            return;
        }
        const today = new Date();
        const birthDate = new Date(today);
        birthDate.setFullYear(today.getFullYear() - ageNum);
        birthDate.setMonth(0, 1);
        value = birthDate.toISOString();
    }
    
    if (!value && field !== 'age') {
        showToast('Значення не може бути порожнім', true);
        return;
    }
    
    const submitBtn = document.getElementById('submitEditBtn');
    const originalHtml = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="btn-spinner"></span>';
    
    try {
        const result = await callScript('updateUser', {
            row: row,
            field: field,
            value: value
        });
        
        if (result.error) throw new Error(result.error);
        
        const updatedItem = allData.find(item => item.row === row);
        if (updatedItem) {
            if (field === 'age') {
                updatedItem.age = value;
            } else {
                updatedItem[field] = value;
            }
        }
        
        closeEditModal();
        applyFilters();
        showToast(`✅ Дані успішно оновлено`);
    } catch (err) {
        showToast(`Помилка: ${err.message}`, true);
        await loadData(false);
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalHtml;
    }
}

async function handleDeposit(row, parentName, childFullName, button) {
    const amount = prompt(`Сума поповнення для ${parentName}\n(дитина: ${childFullName}):\nБонус +5%`, "");
    if (amount === null) return;
    
    let numAmount = parseFloat(amount);
    if (isNaN(numAmount) || numAmount <= 0) {
        showToast("Введіть коректну суму", true);
        return;
    }
    
    const bonus = numAmount * 0.05;
    const totalAmount = numAmount + bonus;
    
    const originalHtml = button.innerHTML;
    button.disabled = true;
    button.innerHTML = '<span class="btn-spinner"></span>';
    
    try {
        const result = await callScript('deposit', { row: row, amount: totalAmount });
        if (result.error) throw new Error(result.error);
        
        const updatedItem = allData.find(item => item.row == row);
        if (updatedItem) {
            const currentBalance = parseFloat(updatedItem.balance);
            if (!isNaN(currentBalance)) {
                updatedItem.balance = (currentBalance + totalAmount).toString();
            }
            updatedItem.lastVisit = new Date().toISOString();
        }
        
        applyFilters();
        showToast(`✅ ${parentName}: +${numAmount.toFixed(2)} + бонус ${bonus.toFixed(2)} = ${totalAmount.toFixed(2)}`);
    } catch (err) {
        showToast(`Помилка: ${err.message}`, true);
        await loadData(false);
    } finally {
        button.disabled = false;
        button.innerHTML = originalHtml;
    }
}

async function handleWithdraw(row, parentName, childFullName, button) {
    const amount = prompt(`Сума зняття для ${parentName}\n(дитина: ${childFullName}):`, "");
    if (amount === null) return;
    
    const numAmount = parseFloat(amount);
    if (isNaN(numAmount) || numAmount <= 0) {
        showToast("Введіть коректну суму", true);
        return;
    }
    
    const originalHtml = button.innerHTML;
    button.disabled = true;
    button.innerHTML = '<span class="btn-spinner"></span>';
    
    try {
        const result = await callScript('withdraw', { row: row, amount: numAmount });
        if (result.error) throw new Error(result.error);
        
        const updatedItem = allData.find(item => item.row == row);
        if (updatedItem) {
            const currentBalance = parseFloat(updatedItem.balance);
            if (!isNaN(currentBalance)) {
                updatedItem.balance = (currentBalance - numAmount).toString();
            }
            if (updatedItem.visits !== undefined) {
                updatedItem.visits = (parseInt(updatedItem.visits) || 0) + 1;
            }
            updatedItem.lastVisit = new Date().toISOString();
        }
        
        applyFilters();
        showToast(`✅ ${parentName}: ${result.message}`);
    } catch (err) {
        showToast(`Помилка: ${err.message}`, true);
        await loadData(false);
    } finally {
        button.disabled = false;
        button.innerHTML = originalHtml;
    }
}

async function addNewUser() {
    const parent = document.getElementById('addParent').value.trim();
    const phone = document.getElementById('addPhone').value.trim();
    const childSurname = document.getElementById('addChildSurname').value.trim();
    const childName = document.getElementById('addChildName').value.trim();
    const childAge = document.getElementById('addChildAge').value;
    const cardNumber = document.getElementById('addCardNumber').value.trim();
    let balance = parseFloat(document.getElementById('addBalance').value);
    
    if (isNaN(balance)) balance = 0;
    const visits = 1;
    
    let birthday = null;
    if (childAge !== '') {
        const ageNum = parseInt(childAge);
        if (!isNaN(ageNum) && ageNum >= 0 && ageNum <= 18) {
            const today = new Date();
            const birthDate = new Date(today);
            birthDate.setFullYear(today.getFullYear() - ageNum);
            birthDate.setMonth(0, 1);
            birthday = birthDate.toISOString();
        }
    }
    
    const submitBtn = document.getElementById('submitAddBtn');
    const originalHtml = submitBtn.innerHTML;
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="btn-spinner"></span>';
    
    try {
        const result = await callScript('addUser', { 
            parent: parent || '',
            phone: phone || '',
            childSurname: childSurname || '',
            childName: childName || '',
            birthday: birthday,
            cardNumber: cardNumber || '',
            visits: visits,
            balance: balance
        });
        
        if (result.error) throw new Error(result.error);
        
        showToast(`✅ Клієнта додано`);
        closeAddModal();
        await loadData(true);
        
        document.getElementById('addParent').value = '';
        document.getElementById('addPhone').value = '';
        document.getElementById('addChildSurname').value = '';
        document.getElementById('addChildName').value = '';
        document.getElementById('addChildAge').value = '';
        document.getElementById('addCardNumber').value = '';
        document.getElementById('addBalance').value = '0';
        
    } catch (err) {
        showToast(`Помилка: ${err.message}`, true);
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalHtml;
    }
}

function openAddModal() {
    document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
    document.getElementById('addModal').classList.remove('active');
}

function clearSearch() {
    document.getElementById('parentSearch').value = '';
    document.getElementById('phoneSearch').value = '';
    document.getElementById('childSurnameSearch').value = '';
    document.getElementById('childNameSearch').value = '';
    document.getElementById('cardSearch').value = '';
    document.getElementById('ageSearch').value = '';
    document.getElementById('lastVisitSearch').value = '';
    
    if (allData.length > 0) {
        currentFilteredData = [...allData];
        renderTableFast(currentFilteredData);
    } else {
        applyFilters();
    }
    
    showToast('Пошук очищено');
}

function showToast(msg, isError = false) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

function handleKeyPress(e) {
    if (e.key === 'Enter') applyFilters();
}

window.onclick = function(event) {
    const addModal = document.getElementById('addModal');
    const editModal = document.getElementById('editModal');
    if (event.target === addModal) closeAddModal();
    if (event.target === editModal) closeEditModal();
}

window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('searchBtnHeader').addEventListener('click', applyFilters);

    document.getElementById('parentSearch').addEventListener('keypress', handleKeyPress);
    document.getElementById('phoneSearch').addEventListener('keypress', handleKeyPress);

    document.getElementById('cardSearch').addEventListener('keypress', handleKeyPress);
    document.getElementById('ageSearch').addEventListener('keypress', handleKeyPress);
    document.getElementById('lastVisitSearch').addEventListener('change', applyFilters);
    
    loadData(true);
});

window.loadData = loadData;
window.clearSearch = clearSearch;
window.applyFilters = applyFilters;
window.openAddModal = openAddModal;
window.closeAddModal = closeAddModal;
window.addNewUser = addNewUser;
window.openEditModal = openEditModal;
